services:
  text-service:
    container_name: text-service
    build: .
    ports:
      - "8010:8000"
    volumes:
      - /home/xbuianh/evilflowers-text-service:/app
      - /mnt/data/catalogs:/app/src/data/catalogs:ro
    depends_on:
      - elasticsearch
      - search-service
      - redis
    environment:
      - SEARCH_SERVICE_URL=http://search-service:8001
      - TABLE_EXTRACTOR=PdfPlumber
      - TEXT_EXTRACTOR_MODE=None
      - STORAGE_PATH=/app/src/data
    command: >
      watchmedo auto-restart 
      --directory=/app/src 
      --pattern='*.py' 
      --recursive 
      -- 
      celery -A src.main worker --loglevel=info -E --pool=solo --queues=evilflowers_text_worker
    networks:
      - elk
      # - shared-redis

  search-service:
    container_name: search-service
    build:
      context: /home/xbuianh/evilflowers-search-service
      dockerfile: Dockerfile
    volumes:
      - /home/xbuianh/evilflowers-search-service:/app
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8001:8001"
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=evilflowers   
      - USE_MILVUS_LITE=false
      - MILVUS_HOST=milvus-standalone
      - MILVUS_COLLECTION_NAME=document_embeddings
      - MILVUS_MAX_TEXT_LENGTH=8000
      - MILVUS_PORT=19530  
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--reload-dir", "/app/src"]

    depends_on:
      - elasticsearch
      - milvus-standalone
    networks:
      - elk
      # - shared-redis

  redis:
    container_name: redis
    image: "redis:7"
    command: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    environment:
      REDIS_REPLICATION_MODE: master
    networks:
      - elk 

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd:/etcd
    networks:
      - elk

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus-minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - elk

  milvus-standalone:
    platform: linux/amd64 
    image: milvusdb/milvus:v2.3.3 
    command: ["milvus", "run", "standalone"]
    container_name: milvus-standalone
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MILVUS_MODE: standalone
      TZ: UTC
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks:
      - elk

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - elk
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

volumes:
  elasticsearch-data:
  milvus-etcd:
  milvus-minio:
  milvus-data:
  redis-data:

networks:
  elk:
    driver: bridge
  # shared-redis:
  #   external: true
